<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Projects</title>
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="/src/masonry.css">
    <style>
      /* Page specific styles */
      .project-page-container {
        padding: 120px 5%;
      }
      .project-page-container h1 {
        font-size: 3.5rem;
        margin-bottom: 50px;
        color: var(--yellow);
        text-transform: uppercase;
        text-align: center;
      }
      .back-button {
        position: absolute;
        top: 130px;
        left: 5%;
        color: var(--white);
        text-decoration: none;
        font-size: 1.2rem;
        transition: color 0.3s ease;
        z-index: 20;
      }
      .back-button:hover {
          color: var(--red);
      }
    </style>
</head>
<body>
    <a href="/#" class="back-button">&larr; Back</a>
    <div class="project-page-container">
        <h1>Software & AI Projects</h1>
        <div id="project-grid"></div>
    </div>

    <script type="module">
        import { Masonry } from '/src/masonry.js';

        const items = [
            { id: "s1", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726a?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 700 },
            { id: "s2", img: "https://images.unsplash.com/photo-1535223289827-42f1e9919769?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 900 },
            { id: "s3", img: "https://images.unsplash.com/photo-1526374965328-5f61d4dc18c5?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 600 },
            { id: "s4", img: "https://images.unsplash.com/photo-1605810230464-38c5b46975f5?q=80&w=1932&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 500 },
            { id: "s5", img: "https://images.unsplash.com/photo-1507146153580-69a1fe6d8aa1?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 800 },
            { id: "s6", img: "https://images.unsplash.com/photo-1599658880115-DBf73b0219a2?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 750 },
            { id: "s7", img: "https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", url: "#", height: 550 },
        ];

        const gridContainer = document.getElementById('project-grid');
        
        new Masonry(gridContainer, items, {
            ease: 'cubic-bezier(0.16, 1, 0.3, 1)',
            duration: 0.8,
            stagger: 0.06,
            animateFrom: 'bottom',
            blurToFocus: true
        });
    </script>
</body>
</html>
